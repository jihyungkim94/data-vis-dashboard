<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Publications Dashboard</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa; padding: 20px; }
        h1 { text-align: center; color: #333; }
        .instructions { text-align: center; color: #666; margin-bottom: 30px; }
        #dashboard { display: flex; justify-content: center; gap: 40px; flex-wrap: wrap; }
        .chart-container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        /* 툴팁 스타일 */
        #tooltip {
            position: absolute;
            opacity: 0;
            background-color: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 8px 12px;
            border-radius: 4px;
            pointer-events: none;
            font-size: 14px;
            transition: opacity 0.2s;
        }

        /* 클릭 가능한 요소의 커서 변경 */
        .clickable { cursor: pointer; }
        .clickable:hover { opacity: 0.8; }
        
        /* 축 스타일 */
        .axis text { font-size: 12px; }
        .axis path, .axis line { stroke: #ccc; }
    </style>
</head>
<body>

    <h1>Global Academic Publications Dashboard</h1>
    <p class="instructions">
        <strong>Cross-Filtering:</strong> Click a bar to filter the line chart by Region. Click a point to filter the bar chart by Year. Click background to reset.
    </p>

    <div id="dashboard">
        <div class="chart-container" id="bar-chart" width="400" height="300"></div>
        <div class="chart-container" id="line-chart" width="400" height="300"></div>
    </div>

    <div id="tooltip"></div>

    <script>
        // 1. 데이터 정의 (CORS 방지를 위해 내장)
        const rawData = [
            { region: "North America", year: 2018, publications: 1200 },
            { region: "North America", year: 2019, publications: 1400 },
            { region: "North America", year: 2020, publications: 1700 },
            { region: "North America", year: 2021, publications: 2100 },
            { region: "North America", year: 2022, publications: 2400 },
            { region: "Europe", year: 2018, publications: 1100 },
            { region: "Europe", year: 2019, publications: 1150 },
            { region: "Europe", year: 2020, publications: 1300 },
            { region: "Europe", year: 2021, publications: 1450 },
            { region: "Europe", year: 2022, publications: 1600 },
            { region: "Asia", year: 2018, publications: 1500 },
            { region: "Asia", year: 2019, publications: 1800 },
            { region: "Asia", year: 2020, publications: 2200 },
            { region: "Asia", year: 2021, publications: 2800 },
            { region: "Asia", year: 2022, publications: 3200 }
        ];

        const regions = ["North America", "Europe", "Asia"];
        const years = [2018, 2019, 2020, 2021, 2022];
        const colorScale = d3.scaleOrdinal().domain(regions).range(["#1f77b4", "#ff7f0e", "#2ca02c"]);

        // 상태 변수 (크로스 필터링용)
        let selectedRegion = null;
        let selectedYear = null;

        // 공통 마진 및 크기 설정
        const margin = {top: 40, right: 20, bottom: 40, left: 60};
        const width = 400 - margin.left - margin.right;
        const height = 300 - margin.top - margin.bottom;

        // SVG 캔버스 생성
        const svgBar = d3.select("#bar-chart").append("svg")
            .attr("width", width + margin.left + margin.right)
            .attr("height", height + margin.top + margin.bottom)
            .on("click", (e) => { if(e.target.tagName !== 'rect') resetFilters(); })
            .append("g").attr("transform", `translate(${margin.left},${margin.top})`);

        const svgLine = d3.select("#line-chart").append("svg")
            .attr("width", width + margin.left + margin.right)
            .attr("height", height + margin.top + margin.bottom)
            .on("click", (e) => { if(e.target.tagName !== 'circle') resetFilters(); })
            .append("g").attr("transform", `translate(${margin.left},${margin.top})`);

        // 제목 추가
        svgBar.append("text").attr("x", width/2).attr("y", -10).attr("text-anchor", "middle").style("font-weight", "bold").text("Publications by Region");
        svgLine.append("text").attr("x", width/2).attr("y", -10).attr("text-anchor", "middle").style("font-weight", "bold").text("Trend over Time");

        // 툴팁 설정
        const tooltip = d3.select("#tooltip");

        // 2. 스케일 축 초기화
        const xBar = d3.scaleBand().range([0, width]).padding(0.2);
        const yBar = d3.scaleLinear().range([height, 0]);
        const xAxisBar = svgBar.append("g").attr("transform", `translate(0,${height})`).attr("class", "axis");
        const yAxisBar = svgBar.append("g").attr("class", "axis");

        const xLine = d3.scaleLinear().domain([2018, 2022]).range([0, width]);
        const yLine = d3.scaleLinear().range([height, 0]);
        const xAxisLine = svgLine.append("g").attr("transform", `translate(0,${height})`).attr("class", "axis").call(d3.axisBottom(xLine).ticks(5).tickFormat(d3.format("d")));
        const yAxisLine = svgLine.append("g").attr("class", "axis");

        const lineGenerator = d3.line()
            .x(d => xLine(d.year))
            .y(d => yLine(d.value))
            .curve(d3.curveMonotoneX);

        // 3. 업데이트 함수 (핵심 렌더링 및 필터링 로직)
        function update() {
            // 필터링된 데이터 계산
            const barData = regions.map(r => {
                let filtered = rawData.filter(d => d.region === r);
                if (selectedYear) filtered = filtered.filter(d => d.year === selectedYear);
                return { region: r, value: d3.sum(filtered, d => d.publications) };
            });

            const lineData = years.map(y => {
                let filtered = rawData.filter(d => d.year === y);
                if (selectedRegion) filtered = filtered.filter(d => d.region === selectedRegion);
                return { year: y, value: d3.sum(filtered, d => d.publications) };
            });

            // 스케일 도메인 업데이트
            xBar.domain(regions);
            yBar.domain([0, d3.max(barData, d => d.value) * 1.1]);
            yLine.domain([0, d3.max(lineData, d => d.value) * 1.1]);

            // 축 애니메이션 트랜지션
            xAxisBar.transition().duration(500).call(d3.axisBottom(xBar));
            yAxisBar.transition().duration(500).call(d3.axisLeft(yBar));
            yAxisLine.transition().duration(500).call(d3.axisLeft(yLine));

            // --- Bar Chart 렌더링 ---
            const bars = svgBar.selectAll("rect").data(barData, d => d.region);
            
            bars.join("rect")
                .attr("class", "clickable")
                .attr("x", d => xBar(d.region))
                .attr("width", xBar.bandwidth())
                .attr("fill", d => selectedRegion === d.region || !selectedRegion ? colorScale(d.region) : "#ddd")
                .on("mouseover", function(event, d) {
                    tooltip.style("opacity", 1).html(`${d.region}<br/>Total: <strong>${d.value}</strong>`)
                           .style("left", (event.pageX + 10) + "px").style("top", (event.pageY - 28) + "px");
                    d3.select(this).attr("stroke", "black").attr("stroke-width", 2);
                })
                .on("mousemove", function(event) {
                    tooltip.style("left", (event.pageX + 10) + "px").style("top", (event.pageY - 28) + "px");
                })
                .on("mouseout", function() {
                    tooltip.style("opacity", 0);
                    d3.select(this).attr("stroke", "none");
                })
                .on("click", function(event, d) {
                    selectedRegion = (selectedRegion === d.region) ? null : d.region; // 토글 로직
                    selectedYear = null; // 타겟 초기화
                    update();
                })
                .transition().duration(500)
                .attr("y", d => yBar(d.value))
                .attr("height", d => height - yBar(d.value));

            // --- Line Chart 렌더링 ---
            // 선 그리기
            const path = svgLine.selectAll(".trend-line").data([lineData]);
            
            path.join("path")
                .attr("class", "trend-line")
                .attr("fill", "none")
                .attr("stroke", selectedRegion ? colorScale(selectedRegion) : "#666")
                .attr("stroke-width", 3)
                .transition().duration(500)
                .attr("d", lineGenerator);

            // 데이터 점 그리기
            const dots = svgLine.selectAll("circle").data(lineData, d => d.year);
            
            dots.join("circle")
                .attr("class", "clickable")
                .attr("r", 6)
                .attr("fill", selectedYear ? (d => d.year === selectedYear ? "red" : "#ccc") : (selectedRegion ? colorScale(selectedRegion) : "#666"))
                .on("mouseover", function(event, d) {
                    tooltip.style("opacity", 1).html(`Year: ${d.year}<br/>Total: <strong>${d.value}</strong>`)
                           .style("left", (event.pageX + 10) + "px").style("top", (event.pageY - 28) + "px");
                    d3.select(this).attr("r", 9);
                })
                .on("mousemove", function(event) {
                    tooltip.style("left", (event.pageX + 10) + "px").style("top", (event.pageY - 28) + "px");
                })
                .on("mouseout", function() {
                    tooltip.style("opacity", 0);
                    d3.select(this).attr("r", 6);
                })
                .on("click", function(event, d) {
                    selectedYear = (selectedYear === d.year) ? null : d.year; // 토글 로직
                    selectedRegion = null; // 타겟 초기화
                    update();
                })
                .transition().duration(500)
                .attr("cx", d => xLine(d.year))
                .attr("cy", d => yLine(d.value));
        }

        // 초기화 함수
        function resetFilters() {
            selectedRegion = null;
            selectedYear = null;
            update();
        }

        // 4. 초기 화면 렌더링
        update();
    </script>
</body>
</html>
